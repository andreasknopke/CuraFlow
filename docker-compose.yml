services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-curaflow}
      MYSQL_USER: ${MYSQL_USER:-curaflow}
      MYSQL_PASSWORD: '${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env or the shell}'
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env or the shell}'
    ports:
      - '${MYSQL_HOST_PORT:-3306}:3306'
    volumes:
      - curaflow-mysql:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent']
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile.coolify
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-curaflow}
      MYSQL_PASSWORD: '${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env or the shell}'
      MYSQL_DATABASE: ${MYSQL_DATABASE:-curaflow}
      JWT_SECRET: '${JWT_SECRET:?Set JWT_SECRET in .env or the shell}'
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      API_URL: ${API_URL:-http://localhost:3000}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      CURAFLOW_ADMIN_EMAIL: ${CURAFLOW_ADMIN_EMAIL:-admin@example.com}
      CURAFLOW_ADMIN_PASSWORD: '${CURAFLOW_ADMIN_PASSWORD:?Set CURAFLOW_ADMIN_PASSWORD in .env or the shell}'
      CURAFLOW_ADMIN_NAME: ${CURAFLOW_ADMIN_NAME:-Local Administrator}
      CURAFLOW_SEED_DEMO_DATA: ${CURAFLOW_SEED_DEMO_DATA:-true}
      CURAFLOW_DB_WAIT_RETRIES: ${CURAFLOW_DB_WAIT_RETRIES:-60}
      CURAFLOW_DB_WAIT_MS: ${CURAFLOW_DB_WAIT_MS:-2000}
    command:
      - sh
      - -c
      - node scripts/seed-local-docker.js && exec node index.js
    ports:
      - '${APP_PORT:-3000}:3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/health'').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  curaflow-mysql:
